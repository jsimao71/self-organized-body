<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430"><style>text{font-family:Arial,sans-serif;fill:#17212B}.h{font-size:28px;font-weight:bold}.t{font-size:19px}.box{fill:#F7F5EF;stroke:#1F667A;stroke-width:2}.arrow{stroke:#B66A3C;stroke-width:4;fill:none;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#B66A3C"/></marker></defs><rect x="40" y="55" width="410" height="310" rx="18" class="box"/><text x="245" y="95" text-anchor="middle" class="h">Machine view</text><text x="245" y="145" text-anchor="middle" class="t">Find the failed component</text><path d="M245 165 V230" class="arrow"/><text x="245" y="270" text-anchor="middle" class="t">Repair or replace it</text><text x="245" y="320" text-anchor="middle" class="t">Essential for acute failures</text><rect x="550" y="55" width="410" height="310" rx="18" class="box"/><text x="755" y="95" text-anchor="middle" class="h">River view</text><text x="755" y="140" text-anchor="middle" class="t">Ask what upstream dynamics</text><text x="755" y="166" text-anchor="middle" class="t">keep recreating the failure</text><path d="M755 185 V240" class="arrow"/><text x="755" y="277" text-anchor="middle" class="t">Restore flow and constraints</text><text x="755" y="320" text-anchor="middle" class="t">Combine with direct repair</text></svg>